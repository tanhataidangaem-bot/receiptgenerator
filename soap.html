<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Natural Thai · Client Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAF7F2; --card:#FFFFFF; --border:#E2D9CC; --line:#EDE6DB;
  --muted:#9A8F82; --mid:#6B5F52; --ink:#2C2419;
  --gold:#8B6914; --gold-bg:#FDF5E4; --gold-border:#D4A843;
  --green:#3A6B45; --green-bg:#EDF4EF; --green-border:#6BAF7A;
  --red:#8B2A1A; --red-bg:#FDF0EE; --red-border:#C0392B;
  --blue:#1A4A8B; --blue-bg:#EEF3FD;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.5;}
.shell{max-width:520px;margin:0 auto; display:none;} /* Hidden until unlocked */

/* LOCKSCREEN */
.lock-screen { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.lock-box { background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:30px 24px; width:100%; max-width:360px; text-align:center; box-shadow:0 8px 24px rgba(44,36,25,0.05); }

/* HEADER */
.header{position:sticky;top:0;z-index:50;background:rgba(250,247,242,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 20px 14px;}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);letter-spacing:0.03em;}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-top:1px;}
.btn-add{width:46px;height:46px;border-radius:50%;background:var(--ink);border:none;color:#fff;font-size:28px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-add:active{opacity:0.75;}
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px 13px 46px;font-family:'Inter',sans-serif;font-size:16px;color:var(--ink);outline:none;transition:border-color 0.2s;}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap input:focus{border-color:var(--gold-border);}
.si{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;pointer-events:none;}

/* LIST */
.list-pad{padding-bottom:100px;}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:18px 20px 10px;}
.client-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);cursor:pointer;background:var(--card);transition:background 0.15s;}
.client-row:first-child{border-top:1px solid var(--line);}
.client-row:active{background:var(--gold-bg);}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--gold-bg);border:1.5px solid var(--gold-border);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ci{flex:1;min-width:0;}
.cname{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.csub{font-size:14px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty{padding:60px 20px;text-align:center;}
.empty-h{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--muted);margin-bottom:8px;}
.empty-s{font-size:15px;color:var(--muted);}

/* SYNC */
.sync-bar{position:fixed;bottom:0;width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sdot.loading{background:var(--gold);animation:blink 1s infinite;}
.sdot.error{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

/* PANELS */
.panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;}
.panel.open{display:block;}
.pbar{position:sticky;top:0;z-index:10;background:rgba(250,247,242,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;}
.btn-back{background:none;border:none;cursor:pointer;color:var(--gold);font-size:26px;padding:0;line-height:1;display:flex;align-items:center;}
.ptitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);flex:1;}
.pbar-actions{display:flex;gap:8px;}
.btn-icon{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;color:var(--mid);transition:all 0.2s;}
.btn-icon:active{background:var(--gold-bg);border-color:var(--gold-border);}

/* HERO */
.hero{padding:24px 20px;border-bottom:1px solid var(--border);background:var(--card);}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--ink);line-height:1.1;margin-bottom:16px;}
.hero-name em{font-style:italic;color:var(--gold);}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mk{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.mv{font-size:15px;color:var(--ink);}

/* ACTIONS */
.astrip{display:flex;gap:10px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);}
.btn-soap{flex:1;padding:14px;background:var(--ink);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:16px;cursor:pointer;transition:opacity 0.2s;}
.btn-soap:active{opacity:0.8;}
.btn-rcpt{padding:14px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--mid);font-family:'Inter',sans-serif;font-size:15px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-rcpt:active{border-color:var(--gold-border);color:var(--gold);}

/* HISTORY */
.hist-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:18px 20px 10px;}
.soap-card{margin:0 14px 12px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card);}
.soap-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;}
.soap-head:active{background:var(--gold-bg);}
.sdate{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:500;}
.shead-right{display:flex;align-items:center;gap:10px;}
.btn-edit-soap{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--mid);font-family:'Inter',sans-serif;}
.btn-edit-soap:active{background:var(--gold-bg);}
.sbody{padding:16px;display:none;border-top:1px solid var(--line);}
.sbody.open{display:block;}
.ssec{margin-bottom:16px;}
.ssec:last-child{margin-bottom:0;}
.sk{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:5px;font-weight:500;}
.sv{font-size:15px;color:var(--ink);line-height:1.65;white-space:pre-wrap;}

/* FORMS */
.fbody{padding:22px 20px 80px;}
.field{margin-bottom:18px;}
.flabel{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.flabel.soap{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;letter-spacing:0;text-transform:none;color:var(--green);font-weight:600;}
.field input,.field textarea{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;font-family:'Inter',sans-serif;font-size:16px;color:var(--ink);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.field input:focus,.field textarea:focus{border-color:var(--gold-border);}
.field textarea{resize:vertical;min-height:90px;line-height:1.6;}
.btn-save{width:100%;padding:16px;background:var(--ink);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:17px;cursor:pointer;margin-top:10px;transition:opacity 0.2s;}
.btn-save:active{opacity:0.8;}

/* TOAST */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:24px;font-size:15px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.18);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="brand-name" style="margin-bottom:4px;">Natural Thai</div>
    <div class="brand-sub" style="margin-bottom:24px;">Clinical Access</div>
    <div class="field">
      <input type="password" id="passInput" placeholder="Enter Access Password" style="width:100%; text-align:center; padding:14px; border-radius:12px; border:1.5px solid var(--border);">
    </div>
    <button class="btn-save" onclick="checkPassword()">Unlock System</button>
  </div>
</div>

<div class="shell" id="appShell">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="brand-name">Natural Thai</div>
        <div class="brand-sub">Clinical Notes</div>
      </div>
      <button class="btn-add" onclick="openNewClient()">+</button>
    </div>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="search" id="searchInput" placeholder="Search by name or phone…" oninput="renderList()" autocomplete="off">
    </div>
  </div>
  
  <div class="list-pad">
    <div class="sec-label">All Clients</div>
    <div id="clientList"></div>
  </div>
  
  <div class="sync-bar">
    <div class="sdot loading" id="syncDot"></div>
    <span id="syncText">Connecting to Google Sheets…</span>
  </div>
</div>

<div class="panel" id="panelClient">
  <div class="pbar">
    <button class="btn-back" onclick="closePanel('panelClient')">←</button>
    <div class="ptitle" id="detailTitle"></div>
  </div>
  <div class="hero">
    <div class="hero-name" id="heroName"></div>
    <div class="meta-grid" id="metaGrid"></div>
  </div>
  <div class="astrip">
    <button class="btn-soap" onclick="openSOAP()">+ Add SOAP Note</button>
  </div>
  <div class="hist-label">Visit History</div>
  <div id="soapList" style="padding-bottom:48px"></div>
</div>

<div class="panel" id="panelSOAP">
  <div class="pbar">
    <button class="btn-back" onclick="closePanel('panelSOAP')">←</button>
    <div class="ptitle" id="soapFormTitle">SOAP Note</div>
  </div>
  <div class="fbody">
    <div class="field"><label class="flabel">Date</label><input type="date" id="soap-date"></div>
    <div class="field"><label class="flabel soap">S — Subjective</label><textarea id="soap-s" rows="3"></textarea></div>
    <div class="field"><label class="flabel soap">O — Objective</label><textarea id="soap-o" rows="3"></textarea></div>
    <div class="field"><label class="flabel soap">A — Assessment</label><textarea id="soap-a" rows="2"></textarea></div>
    <div class="field"><label class="flabel soap">P — Plan</label><textarea id="soap-p" rows="3"></textarea></div>
    <button class="btn-save" id="btnSaveSOAP" onclick="saveSOAP()">Save Note</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT='https://script.google.com/macros/s/AKfycbzWIIZI3QQ5i2Dy4w3MiLEErtfAU1fUnoOTPnMMLXNC1ee0xNIBDtIYuZIZT7pkBtB4/exec';
const APP_PASSWORD = "happyending888"; // 🔒 เปลี่ยนรหัสผ่านตรงนี้ได้ตามต้องการ

let clients=[], currentId=null, editingVisitIdx=null;

// ── PASSWORD GATE ───────────────────────────
function checkPassword() {
  const p = document.getElementById('passInput').value;
  if(p === APP_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    loadClients();
  } else {
    alert('Incorrect Password!');
  }
}

// ── SERVER SYNC ──────────────────────────────
function sheetCall(p){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const url=SCRIPT+'?'+new URLSearchParams({...p,callback:cb});
    const s=document.createElement('script');
    window[cb]=d=>{delete window[cb];s.remove();res(d);};
    s.onerror=()=>{delete window[cb];s.remove();rej(new Error('Network error'));};
    s.src=url;document.head.appendChild(s);
    setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();rej(new Error('Timeout'));}},15000);
  });
}

function setSync(state,msg){
  document.getElementById('syncDot').className='sdot'+(state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('syncText').textContent=msg;
}

async function loadClients(){
  setSync('loading','Syncing…');
  try{
    const r=await sheetCall({action:'getClients'});
    if(r.ok){
      clients=(r.clients||[]).filter(c=>{
        const n=(c.Name || c.name || '');
        return n.length>1 && !/waiting/i.test(n);
      });
      setSync('ok',clients.length+' clients synced');
      renderList();
    } else throw new Error(r.error);
  }catch(e){setSync('error','Connection failed'); showToast('Error sync Sheets');}
}

// ── CLIENT LIST & SEARCH (จุดแก้ที่ 2: ค้นหาสมบูรณ์แบบ) ──────────────────
function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=clients.filter(c=>{
    const name=(c.Name || c.name || '').toLowerCase();
    const phone=(c.Phone || c.phone || '').toLowerCase().replace(/\s+/g,'');
    return name.includes(q) || phone.includes(q.replace(/\s+/g,''));
  });
  
  const el=document.getElementById('clientList');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-h">No results</div></div>';
    return;
  }
  
  el.innerHTML=list.map(c=>{
    const name = c.Name || c.name || 'Unknown';
    const ini= name.charAt(0).toUpperCase();
    return `<div class="client-row" onclick="openClient('${c.ID}')">
      <div class="avatar">${ini}</div>
      <div class="ci"><div class="cname">${name}</div></div>
    </div>`;
  }).join('');
}

// ── CLIENT PANEL ─────────────────────────────
async function openClient(id){
  currentId=id;
  const c=clients.find(x=>String(x.ID)===String(id))||{};
  document.getElementById('detailTitle').textContent=c.Name||'Client';
  document.getElementById('heroName').textContent=c.Name||'';
  document.getElementById('metaGrid').innerHTML=`<div><div class="mk">Phone</div><div class="mv">${c.Phone||'-'}</div></div>`;
  openPanel('panelClient');
  loadVisits();
}

async function loadVisits(){
  const el=document.getElementById('soapList');
  el.innerHTML='<div style="padding:20px; color:var(--muted)">Loading history...</div>';
  try{
    const r=await sheetCall({action:'getVisits', clientId:currentId});
    window._currentVisits=r.visits||[];
    renderVisits(window._currentVisits);
  }catch(e){el.innerHTML='<div style="padding:20px;">Failed to load visits.</div>';}
}

function renderVisits(visits){
  const el=document.getElementById('soapList');
  if(!visits.length){el.innerHTML='<div style="padding:20px; font-style:italic;">No history found.</div>';return;}
  
  el.innerHTML=visits.map((v,i)=>`
    <div class="soap-card">
      <div class="soap-head" onclick="toggleSoapBody(${i})">
        <span class="sdate">${v.Date ? v.Date.split('T')[0] : 'No Date'}</span>
        <div class="shead-right">
          <button class="btn-edit-soap" onclick="event.stopPropagation(); editSOAP(${i})">Edit</button>
          <button class="btn-edit-soap" style="color:var(--red); border-color:var(--red-border);" onclick="event.stopPropagation(); deleteVisit(${i})">Delete</button>
        </div>
      </div>
      <div class="sbody" id="sb${i}">
        <div class="ssec"><div class="sk">S</div><div class="sv">${v.S||''}</div></div>
        <div class="ssec"><div class="sk">O</div><div class="sv">${v.O||''}</div></div>
        <div class="ssec"><div class="sk">A</div><div class="sv">${v.A||''}</div></div>
        <div class="ssec"><div class="sk">P</div><div class="sv">${v.P||''}</div></div>
      </div>
    </div>
  `).join('');
}

function toggleSoapBody(i){
  const el=document.getElementById('sb'+i);
  el.style.display = (el.style.display==='block') ? 'none' : 'block';
}

// ── SOAP ACTIONS (จุดแก้ที่ 1: จัดการเรื่องวันที่ & จุดแก้ที่ 3: แก้ไข/ลบ) ──
function openSOAP(){
  editingVisitIdx=null;
  document.getElementById('soapFormTitle').textContent = "Add SOAP Note";
  
  // 📆 แก้ไขจุดที่ 1: ดึงวันที่ปัจจุบันของ Local เครื่อง ไม่ให้วันที่ถอยหลัง
  const tzoffset = (new Date()).getTimezoneOffset() * 60000;
  const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
  document.getElementById('soap-date').value = localISOTime;
  
  document.getElementById('soap-s').value='';
  document.getElementById('soap-o').value='';
  document.getElementById('soap-a').value='';
  document.getElementById('soap-p').value='';
  openPanel('panelSOAP');
}

function editSOAP(idx){
  editingVisitIdx=idx;
  const v=window._currentVisits[idx];
  document.getElementById('soapFormTitle').textContent = "Edit SOAP Note";
  document.getElementById('soap-date').value = v.Date ? v.Date.split('T')[0] : '';
  document.getElementById('soap-s').value = v.S||'';
  document.getElementById('soap-o').value = v.O||'';
  document.getElementById('soap-a').value = v.A||'';
  document.getElementById('soap-p').value = v.P||'';
  openPanel('panelSOAP');
}

async function saveSOAP(){
  setSync('loading','Saving note...');
  const data={
    action:'saveSOAP',
    clientId:currentId,
    date:document.getElementById('soap-date').value,
    s:document.getElementById('soap-s').value,
    o:document.getElementById('soap-o').value,
    a:document.getElementById('soap-a').value,
    p:document.getElementById('soap-p').value,
    visitIdx: editingVisitIdx !== null ? editingVisitIdx : -1
  };
  try{
    const r=await sheetCall(data);
    if(r.ok){
      showToast('Saved successfully');
      closePanel('panelSOAP');
      loadVisits();
    } else { alert('Error: '+r.error); }
  }catch(e){alert('Save network error');}
  setSync('ok','Ready');
}

async function deleteVisit(idx){
  if(!confirm('Are you sure you want to delete this note?')) return;
  setSync('loading','Deleting note...');
  try{
    // ส่งข้อมูลสั่งลบไปยัง Google Sheets อ้างอิงตาม clientId และ ลำดับแถว (visitIdx)
    const r=await sheetCall({action:'deleteVisit', clientId:currentId, visitIdx:idx});
    if(r.ok){
      showToast('Note deleted');
      loadVisits();
    }else{ alert('Error: '+r.error); }
  }catch(e){alert('Delete network error');}
  setSync('ok','Ready');
}

// ── UTILS ────────────────────────────────────
function openPanel(id){ document.getElementById(id).classList.add('open'); }
function closePanel(id){ document.getElementById(id).classList.remove('open'); }
function showToast(m){
  const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
