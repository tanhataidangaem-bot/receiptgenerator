<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:16px;}
.shell{max-width:520px;margin:0 auto;padding:24px 20px 80px;}
.header{text-align:center;margin-bottom:32px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--ink);}

.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--gold);}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.btn-import{width:100%;padding:18px;background:var(--ink);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:18px;cursor:pointer;margin-bottom:16px;transition:opacity 0.2s;}
.btn-import:disabled{opacity:0.5;cursor:not-allowed;}
.progress-wrap{background:var(--border);border-radius:100px;height:10px;margin-bottom:12px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:var(--green);border-radius:100px;transition:width 0.3s;width:0%;}
.log{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;max-height:300px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;display:none;}
.log-ok{color:var(--green);}
.log-err{color:var(--red);}
.log-info{color:var(--muted);}
.done-banner{background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:12px;padding:20px;text-align:center;display:none;margin-bottom:16px;}
.done-banner h2{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--green);margin-bottom:8px;}
.done-banner p{font-size:14px;color:var(--green);}

.warning{background:var(--gold-bg);border:1.5px solid var(--gold-border);border-radius:12px;padding:16px;margin-bottom:20px;font-size:14px;color:var(--gold);}

function sheetCall(p){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const url=SCRIPT+'?'+new URLSearchParams({...p,callback:cb});
    const s=document.createElement('script');
    window[cb]=d=>{delete window[cb];s.remove();res(d);};
    s.onerror=()=>{delete window[cb];s.remove();rej(new Error('Network error'));};
    s.src=url;document.head.appendChild(s);
    setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();rej(new Error('Timeout'));}},20000);
  });
}

function log(msg,type='info'){
  const el=document.getElementById('log');
  el.style.display='block';
  const line=document.createElement('div');
  line.className='log-'+type;
  line.textContent=msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

function setProgress(done,total){
  const pct=Math.round(done/total*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=done+' / '+total+' ลูกค้า ('+pct+'%)';
}

async function startImport(){
  const btn=document.getElementById('btnImport');
  btn.disabled=true;
  btn.textContent='กำลัง Import…';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('progressText').style.display='block';

  let ok=0,err=0,visitOk=0;
  const total=CLIENTS.length;

  for(let i=0;i<CLIENTS.length;i++){
    const c=CLIENTS[i];
    setProgress(i,total);
    try{
      // Add client
      const r=await sheetCall({
        action:'addClient',
        name:c.name||'',phone:c.phone||'',email:c.email||'',
        fund:c.fund||'',dob:'',address:'',occupation:'',medical:'',meds:''
      });
      if(!r.ok) throw new Error(r.error||'failed');
      const clientId=r.clientId;
      ok++;

      // Add visits
      for(const v of (c.visits||[])){
        try{
          await sheetCall({
            action:'addVisit',
            clientId,clientName:c.name||'',
            date:v.date||'',
            treatmentType:'Subsequent',duration:'60 min',pressure:'',
            s:v.s||'',o:v.o||'',a:v.a||'',p:v.p||'',privateNote:''
          });
          visitOk++;
        }catch(ve){log('  Visit error for '+c.name+': '+ve.message,'err');}
      }

      if((i+1)%10===0) log((i+1)+'/'+total+' — '+c.name,'ok');
    }catch(e){
      err++;
      log('ERROR: '+c.name+' — '+e.message,'err');
    }

    // Small delay to avoid rate limiting
    await new Promise(r=>setTimeout(r,200));
  }

  setProgress(total,total);
  document.getElementById('doneBanner').style.display='block';
  document.getElementById('doneText').textContent='นำเข้า '+ok+' ลูกค้า, '+visitOk+' visits สำเร็จ'+(err>0?' ('+err+' error)':'');
  document.getElementById('btnGo').style.display='block';
  btn.style.display='none';
  log('--- เสร็จสิ้น: '+ok+' ลูกค้า, '+visitOk+' visits ---','ok');
}
</script>
